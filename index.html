<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ModelScan Debug</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;padding:16px;background:#f0f2f5;}
h2{color:#003F7A;margin-bottom:12px;font-size:18px;}
.log{background:#1a1d23;color:#4ecb71;padding:12px;border-radius:8px;
  font-family:monospace;font-size:12px;margin-bottom:12px;
  min-height:120px;white-space:pre-wrap;word-break:break-all;}
.btn{display:block;width:100%;padding:18px;background:#005CA9 !important;
  color:#fff !important;border:none !important;border-radius:10px;
  font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;
  -webkit-appearance:none !important;appearance:none !important;
  margin-bottom:12px;text-align:center;opacity:1 !important;
  touch-action:manipulation;-webkit-tap-highlight-color:rgba(0,0,0,0.1);
  user-select:none;-webkit-user-select:none;}
.btn:active{background:#003F7A !important;}
.field{margin-bottom:12px;}
label{display:block;font-size:13px;font-weight:600;color:#3C4353;margin-bottom:4px;}
input{width:100%;border:1.5px solid #D0D5DD;border-radius:8px;padding:12px;
  font-size:15px;-webkit-appearance:none;}
.section{background:#fff;border-radius:10px;padding:14px;margin-bottom:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.08);}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;color:#9BA3B2;margin-bottom:10px;}
.ok{color:#1B7F4F;font-weight:700;}
.err{color:#B83232;font-weight:700;}
</style>
</head>
<body>
<h2>ModelScan — Debug iOS</h2>

<div class="log" id="log">Aguardando eventos...\n</div>

<div class="section">
  <div class="sec-title">Campos obrigatórios</div>
  <div class="field"><label>Nome do Modelo *</label>
    <input type="text" id="nm" placeholder="ex: Scoring Crédito PF"></div>
  <div class="field"><label>Área *</label>
    <input type="text" id="ar" placeholder="ex: SUPEC"></div>
  <div class="field"><label>Owner *</label>
    <input type="text" id="ow" placeholder="Seu nome"></div>
  <div class="field"><label>E-mail *</label>
    <input type="text" id="oe" placeholder="seu@email.com"></div>
</div>

<button class="btn" type="button" id="btn-run">▶ Executar Análise</button>

<div id="resultado" style="display:none;padding:16px;background:#E6F4EE;
  border-radius:10px;font-size:15px;font-weight:700;color:#1B7F4F;margin-bottom:12px;">
  ✅ FUNCIONOU! Botão respondeu corretamente.
</div>

<script>
var log = document.getElementById('log');
function addLog(msg, ok) {
  var ts = new Date().toLocaleTimeString('pt-BR');
  log.textContent += '[' + ts + '] ' + msg + '\n';
  log.scrollTop = log.scrollHeight;
}

// Diagnóstico inicial
addLog('DOM carregado: ' + document.readyState);
addLog('iOS Safari: ' + /iPhone|iPad/.test(navigator.userAgent));
addLog('userAgent: ' + navigator.userAgent.slice(0,60));

function GV(id){
  var e=document.getElementById(id);
  return e&&e.value?e.value.trim():'';
}

function iniciar() {
  addLog('iniciar() CHAMADA!');
  var nm=GV('nm'),ar=GV('ar'),ow=GV('ow'),oe=GV('oe');
  addLog('nm="'+nm+'" ar="'+ar+'" ow="'+ow+'" oe="'+oe+'"');
  
  if(!nm){addLog('ERRO: Nome vazio');alert('Informe o Nome do Modelo.');return;}
  if(!ar){addLog('ERRO: Área vazia');alert('Informe a Área.');return;}
  if(!ow){addLog('ERRO: Owner vazio');alert('Informe o Owner.');return;}
  if(!oe){addLog('ERRO: E-mail vazio');alert('Informe o e-mail.');return;}
  
  addLog('Validação OK! Mostrando resultado...');
  document.getElementById('resultado').style.display='block';
  document.getElementById('btn-run').textContent='✅ Funcionou!';
  document.getElementById('btn-run').style.background='#1B7F4F';
}

function bootstrap() {
  addLog('bootstrap() iniciado');
  
  var btn = document.getElementById('btn-run');
  addLog('btn-run encontrado: ' + (btn ? 'SIM' : 'NÃO'));
  
  if(btn) {
    function doRun(e) {
      addLog('EVENTO: ' + e.type);
      if(e && e.preventDefault) e.preventDefault();
      if(e && e.stopPropagation) e.stopPropagation();
      iniciar();
    }
    btn.addEventListener('click',     doRun, false);
    btn.addEventListener('touchend',  doRun, false);
    btn.addEventListener('touchstart', function(e){
      addLog('touchstart detectado');
    }, {passive:true});
    addLog('addEventListener registrado: click + touchend + touchstart');
  }
}

addLog('readyState antes bootstrap: ' + document.readyState);
if(document.readyState==='loading'){
  addLog('Aguardando DOMContentLoaded...');
  document.addEventListener('DOMContentLoaded', function(){
    addLog('DOMContentLoaded disparou');
    bootstrap();
  });
} else {
  addLog('DOM já pronto, chamando bootstrap direto');
  bootstrap();
}
</script>

</body>
</html>
