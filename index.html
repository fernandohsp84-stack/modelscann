<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ModelScan TESTE v13</title>
<style>
body{font-family:-apple-system,sans-serif;padding:20px;background:#f0f2f5;}
.btn{display:block;width:100%;padding:20px;background:#005CA9;color:#fff;
border:none;border-radius:10px;font-size:18px;font-weight:700;margin:20px 0;
-webkit-appearance:none;cursor:pointer;}
.resultado{padding:20px;background:#E6F4EE;border-radius:10px;display:none;
font-size:16px;font-weight:700;color:#1B7F4F;}
</style>
</head>
<body>
<h2 style="color:#003F7A;">ModelScan v13 — Teste de Botão</h2>
<p style="color:#717A8C;margin-bottom:10px;">Se este arquivo foi deployado corretamente, o botão abaixo vai funcionar.</p>
<button class="btn" type="button" id="btn-teste">▶ Testar Botão</button>
<div class="resultado" id="res">✅ BOTÃO FUNCIONOU! Deploy OK. Agora use o arquivo completo.</div>
<script>
function bootstrap(){
  var btn=document.getElementById('btn-teste');
  var res=document.getElementById('res');
  if(btn){
    function doClick(e){
      if(e&&e.preventDefault)e.preventDefault();
      res.style.display='block';
      btn.textContent='✅ Clicado!';
      btn.style.background='#1B7F4F';
    }
    btn.addEventListener('click',    doClick, false);
    btn.addEventListener('touchend', doClick, false);
    btn.addEventListener('touchstart',function(){},{passive:true});
  }
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',bootstrap);
}else{bootstrap();}
</script>
</body>
</html>
